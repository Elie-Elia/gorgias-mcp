name: "Gorgias MCP Server"
description: "MCP server for the Gorgias helpdesk REST API. Read tickets, send replies, manage customers, apply macros, and run searches. Ported from benpalmer1/Gorgias-MCP-Server."
icon: "assets/icon.png"

auth:
  type: none

tools:
  # --- Tickets ---
  - name: "gorgias_list_tickets"
    description: "List tickets with cursor pagination and filters."
  - name: "gorgias_get_ticket"
    description: "Retrieve a single ticket by ID."
  - name: "gorgias_create_ticket"
    description: "Create a new support ticket with messages."
  - name: "gorgias_update_ticket"
    description: "Partial update of an existing ticket."
  - name: "gorgias_delete_ticket"
    description: "Permanently delete a ticket (irreversible)."
  - name: "gorgias_list_ticket_tags"
    description: "List tags currently on a ticket."
  - name: "gorgias_add_ticket_tags"
    description: "Additively add tags to a ticket."
  - name: "gorgias_set_ticket_tags"
    description: "Replace ALL tags on a ticket."
  - name: "gorgias_remove_ticket_tags"
    description: "Remove specific tags from a ticket."
  - name: "gorgias_list_ticket_fields"
    description: "List custom field values on a ticket."
  - name: "gorgias_update_ticket_field"
    description: "Update a single custom field value on a ticket."
  - name: "gorgias_update_ticket_fields"
    description: "Bulk update custom field values on a ticket."
  - name: "gorgias_delete_ticket_field"
    description: "Remove a custom field value from a ticket."

  # --- Ticket Messages ---
  - name: "gorgias_list_ticket_messages"
    description: "Raw messages for a ticket (deprecated; prefer gorgias_list_messages)."
  - name: "gorgias_list_messages"
    description: "Cross-ticket messages with cursor pagination."
  - name: "gorgias_get_message"
    description: "Single message inside a ticket."
  - name: "gorgias_create_message"
    description: "Create a message: send to customer, import as already-sent, or post an internal note."
  - name: "gorgias_update_message"
    description: "Update an existing ticket message."
  - name: "gorgias_delete_message"
    description: "Permanently delete a ticket message."

  # --- Customers ---
  - name: "gorgias_list_customers"
    description: "Paginated customer list with filters."
  - name: "gorgias_get_customer"
    description: "Retrieve a single customer."
  - name: "gorgias_create_customer"
    description: "Create a new customer."
  - name: "gorgias_update_customer"
    description: "Partial update of an existing customer."
  - name: "gorgias_delete_customer"
    description: "Permanently delete one customer."
  - name: "gorgias_delete_customers"
    description: "Bulk delete customers by ID."
  - name: "gorgias_merge_customers"
    description: "Merge a source customer into a target."
  - name: "gorgias_set_customer_data"
    description: "Replace a customer's data field with optional optimistic concurrency."
  - name: "gorgias_list_customer_field_values"
    description: "List custom field values on a customer."
  - name: "gorgias_update_customer_field_value"
    description: "Update one custom field value on a customer."
  - name: "gorgias_update_customer_fields"
    description: "Bulk update custom field values on a customer."
  - name: "gorgias_delete_customer_field_value"
    description: "Remove a custom field value from a customer."

  # --- Macros ---
  - name: "gorgias_list_macros"
    description: "List canned-response macros with filtering and relevance ranking."
  - name: "gorgias_get_macro"
    description: "Retrieve a single macro."
  - name: "gorgias_create_macro"
    description: "Create a new macro."
  - name: "gorgias_update_macro"
    description: "Partial update of a macro."
  - name: "gorgias_delete_macro"
    description: "Permanently delete a macro."
  - name: "gorgias_archive_macros"
    description: "Bulk archive macros (max 30 per request)."
  - name: "gorgias_unarchive_macros"
    description: "Bulk unarchive macros (max 30 per request)."

  # --- Search ---
  - name: "gorgias_search"
    description: "Low-level Gorgias search across customers, agents, tags, teams, integrations, and channels."

  # --- Tags ---
  - name: "gorgias_list_tags"
    description: "List tags with optional filtering."
  - name: "gorgias_get_tag"
    description: "Retrieve a single tag."
  - name: "gorgias_create_tag"
    description: "Create a new tag."
  - name: "gorgias_update_tag"
    description: "Update a tag."
  - name: "gorgias_delete_tag"
    description: "Permanently delete a tag."
  - name: "gorgias_delete_tags"
    description: "Bulk delete tags by ID."
  - name: "gorgias_merge_tags"
    description: "Merge source tags into a destination tag."

  # --- Users ---
  - name: "gorgias_list_users"
    description: "Paginated list of users (agents and admins)."
  - name: "gorgias_get_user"
    description: "Retrieve a user. id=0 returns the caller."
  - name: "gorgias_create_user"
    description: "Create a new agent or admin user."
  - name: "gorgias_update_user"
    description: "Partial update of a user. id=0 updates the caller."
  - name: "gorgias_delete_user"
    description: "Permanently delete a user."

  # --- Views ---
  - name: "gorgias_list_views"
    description: "List saved views."
  - name: "gorgias_get_view"
    description: "Retrieve a saved view."
  - name: "gorgias_create_view"
    description: "Create a new saved view."
  - name: "gorgias_update_view"
    description: "Update an existing saved view."
  - name: "gorgias_delete_view"
    description: "Delete a saved view (system views excluded)."
  - name: "gorgias_list_view_items"
    description: "List tickets in a saved view."
  - name: "gorgias_search_view_items"
    description: "Search tickets with an inline view configuration."

  # --- Account ---
  - name: "gorgias_retrieve_account"
    description: "Retrieve the current account information."
  - name: "gorgias_list_account_settings"
    description: "List account-wide settings (e.g. business hours)."
  - name: "gorgias_create_account_setting"
    description: "Create a new account-level setting."
  - name: "gorgias_update_account_setting"
    description: "Update an existing account setting by ID."

  # --- Custom Fields ---
  - name: "gorgias_list_custom_fields"
    description: "List custom field definitions for Ticket or Customer entities."
  - name: "gorgias_get_custom_field"
    description: "Retrieve a single custom field definition."
  - name: "gorgias_create_custom_field"
    description: "Create a new custom field definition."
  - name: "gorgias_update_custom_field"
    description: "Update a custom field definition."
  - name: "gorgias_bulk_update_custom_fields"
    description: "Bulk update multiple custom field definitions in one request."

  # --- Events ---
  - name: "gorgias_list_events"
    description: "Read-only system event log with filters and pagination."
  - name: "gorgias_get_event"
    description: "Retrieve a single system event by ID."

  # --- Files ---
  - name: "gorgias_upload_file"
    description: "NOT FUNCTIONAL: upload requires multipart; JSON-only client cannot satisfy."
  - name: "gorgias_download_file"
    description: "Download a private Gorgias-hosted file by URL-derived path segments."

  # --- Integrations ---
  - name: "gorgias_list_integrations"
    description: "List integrations, optionally filtered by type."
  - name: "gorgias_get_integration"
    description: "Retrieve a single integration with its HTTP config."
  - name: "gorgias_create_integration"
    description: "Create a new HTTP integration."
  - name: "gorgias_update_integration"
    description: "Update an existing integration."
  - name: "gorgias_delete_integration"
    description: "Delete an integration (deactivates dependent views)."

  # --- Jobs ---
  - name: "gorgias_list_jobs"
    description: "List asynchronous background jobs with filters."
  - name: "gorgias_get_job"
    description: "Retrieve a single background job."
  - name: "gorgias_create_job"
    description: "Queue an asynchronous job (bulk macro apply, ticket export, etc.)."
  - name: "gorgias_update_job"
    description: "Update a job's metadata, params, schedule, or status."
  - name: "gorgias_cancel_job"
    description: "Cancel an in-flight or scheduled job."

  # --- Reporting ---
  - name: "gorgias_retrieve_reporting_statistic"
    description: "Low-level reporting endpoint; prefer gorgias_smart_stats for LLM-friendly defaults."

  # --- Rules ---
  - name: "gorgias_list_rules"
    description: "List automation rules."
  - name: "gorgias_get_rule"
    description: "Retrieve a single automation rule."
  - name: "gorgias_create_rule"
    description: "Create a new automation rule with JS logic and triggers."
  - name: "gorgias_update_rule"
    description: "Partial update of an automation rule."
  - name: "gorgias_delete_rule"
    description: "Permanently delete an automation rule."
  - name: "gorgias_update_rules_priorities"
    description: "Batch update execution priorities for multiple rules."

  # --- Satisfaction Surveys ---
  - name: "gorgias_list_satisfaction_surveys"
    description: "List CSAT surveys."
  - name: "gorgias_get_satisfaction_survey"
    description: "Retrieve a single CSAT survey."
  - name: "gorgias_create_satisfaction_survey"
    description: "Create a CSAT survey for a ticket."
  - name: "gorgias_update_satisfaction_survey"
    description: "Full-replacement update of a CSAT survey."

  # --- Teams ---
  - name: "gorgias_list_teams"
    description: "List teams."
  - name: "gorgias_get_team"
    description: "Retrieve a single team and its members."
  - name: "gorgias_create_team"
    description: "Create a team for auto-assignment."
  - name: "gorgias_update_team"
    description: "Update a team (members replaces existing membership)."
  - name: "gorgias_delete_team"
    description: "Permanently delete a team."

  # --- Voice Calls ---
  - name: "gorgias_list_voice_calls"
    description: "List voice calls (Gorgias Voice integration)."
  - name: "gorgias_get_voice_call"
    description: "Retrieve a single voice call."
  - name: "gorgias_list_voice_call_events"
    description: "List voice call lifecycle events."
  - name: "gorgias_get_voice_call_event"
    description: "Retrieve a single voice call event."
  - name: "gorgias_list_voice_call_recordings"
    description: "List voice call recordings and voicemails."
  - name: "gorgias_get_voice_call_recording"
    description: "Retrieve a single voice call recording or voicemail."
  - name: "gorgias_delete_voice_call_recording"
    description: "Permanently delete a voice call recording or voicemail."

  # --- Widgets ---
  - name: "gorgias_list_widgets"
    description: "List sidebar widgets."
  - name: "gorgias_get_widget"
    description: "Retrieve a single sidebar widget."
  - name: "gorgias_create_widget"
    description: "Create a new sidebar widget."
  - name: "gorgias_update_widget"
    description: "Update a widget (template fully replaces)."
  - name: "gorgias_delete_widget"
    description: "Permanently delete a widget."

  # --- Smart layer (intelligence helpers) ---
  - name: "gorgias_smart_search"
    description: "Intelligent ticket search with auto-detection of emails, IDs, order numbers, customer names, views, and topic keywords."
  - name: "gorgias_smart_get_ticket"
    description: "Retrieve a ticket with its full conversation thread, projected for LLM consumption and chronologically sorted."
  - name: "gorgias_smart_stats"
    description: "Reporting analytics with auto-defaults, validation, agent-name resolution, and pagination."
