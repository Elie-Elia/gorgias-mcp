name: "Gorgias MCP Server"
description: "MCP server for the Gorgias helpdesk REST API. Read tickets, send replies, manage customers, apply macros, and run searches. Ported from benpalmer1/Gorgias-MCP-Server."
icon: "assets/icon.png"

auth:
  type: none

tools:
  # --- Tickets ---
  - name: "gorgias_list_tickets"
    description: "List tickets with cursor pagination and filters."
  - name: "gorgias_get_ticket"
    description: "Retrieve a single ticket by ID."
  - name: "gorgias_create_ticket"
    description: "Create a new support ticket with messages."
  - name: "gorgias_update_ticket"
    description: "Partial update of an existing ticket."
  - name: "gorgias_delete_ticket"
    description: "Permanently delete a ticket (irreversible)."
  - name: "gorgias_list_ticket_tags"
    description: "List tags currently on a ticket."
  - name: "gorgias_add_ticket_tags"
    description: "Additively add tags to a ticket."
  - name: "gorgias_set_ticket_tags"
    description: "Replace ALL tags on a ticket."
  - name: "gorgias_remove_ticket_tags"
    description: "Remove specific tags from a ticket."
  - name: "gorgias_list_ticket_fields"
    description: "List custom field values on a ticket."
  - name: "gorgias_update_ticket_field"
    description: "Update a single custom field value on a ticket."
  - name: "gorgias_update_ticket_fields"
    description: "Bulk update custom field values on a ticket."
  - name: "gorgias_delete_ticket_field"
    description: "Remove a custom field value from a ticket."

  # --- Ticket Messages ---
  - name: "gorgias_list_ticket_messages"
    description: "Raw messages for a ticket (deprecated; prefer gorgias_list_messages)."
  - name: "gorgias_list_messages"
    description: "Cross-ticket messages with cursor pagination."
  - name: "gorgias_get_message"
    description: "Single message inside a ticket."
  - name: "gorgias_create_message"
    description: "Create a message: send to customer, import as already-sent, or post an internal note."
  - name: "gorgias_update_message"
    description: "Update an existing ticket message."
  - name: "gorgias_delete_message"
    description: "Permanently delete a ticket message."

  # --- Customers ---
  - name: "gorgias_list_customers"
    description: "Paginated customer list with filters."
  - name: "gorgias_get_customer"
    description: "Retrieve a single customer."
  - name: "gorgias_create_customer"
    description: "Create a new customer."
  - name: "gorgias_update_customer"
    description: "Partial update of an existing customer."
  - name: "gorgias_delete_customer"
    description: "Permanently delete one customer."
  - name: "gorgias_delete_customers"
    description: "Bulk delete customers by ID."
  - name: "gorgias_merge_customers"
    description: "Merge a source customer into a target."
  - name: "gorgias_set_customer_data"
    description: "Replace a customer's data field with optional optimistic concurrency."
  - name: "gorgias_list_customer_field_values"
    description: "List custom field values on a customer."
  - name: "gorgias_update_customer_field_value"
    description: "Update one custom field value on a customer."
  - name: "gorgias_update_customer_fields"
    description: "Bulk update custom field values on a customer."
  - name: "gorgias_delete_customer_field_value"
    description: "Remove a custom field value from a customer."

  # --- Macros ---
  - name: "gorgias_list_macros"
    description: "List canned-response macros with filtering and relevance ranking."
  - name: "gorgias_get_macro"
    description: "Retrieve a single macro."
  - name: "gorgias_create_macro"
    description: "Create a new macro."
  - name: "gorgias_update_macro"
    description: "Partial update of a macro."
  - name: "gorgias_delete_macro"
    description: "Permanently delete a macro."
  - name: "gorgias_archive_macros"
    description: "Bulk archive macros (max 30 per request)."
  - name: "gorgias_unarchive_macros"
    description: "Bulk unarchive macros (max 30 per request)."

  # --- Search ---
  - name: "gorgias_search"
    description: "Low-level Gorgias search across customers, agents, tags, teams, integrations, and channels."

  # --- Tags ---
  - name: "gorgias_list_tags"
    description: "List tags with optional filtering."
  - name: "gorgias_get_tag"
    description: "Retrieve a single tag."
  - name: "gorgias_create_tag"
    description: "Create a new tag."
  - name: "gorgias_update_tag"
    description: "Update a tag."
  - name: "gorgias_delete_tag"
    description: "Permanently delete a tag."
  - name: "gorgias_delete_tags"
    description: "Bulk delete tags by ID."
  - name: "gorgias_merge_tags"
    description: "Merge source tags into a destination tag."

  # --- Users ---
  - name: "gorgias_list_users"
    description: "Paginated list of users (agents and admins)."
  - name: "gorgias_get_user"
    description: "Retrieve a user. id=0 returns the caller."
  - name: "gorgias_create_user"
    description: "Create a new agent or admin user."
  - name: "gorgias_update_user"
    description: "Partial update of a user. id=0 updates the caller."
  - name: "gorgias_delete_user"
    description: "Permanently delete a user."

  # --- Views ---
  - name: "gorgias_list_views"
    description: "List saved views."
  - name: "gorgias_get_view"
    description: "Retrieve a saved view."
  - name: "gorgias_create_view"
    description: "Create a new saved view."
  - name: "gorgias_update_view"
    description: "Update an existing saved view."
  - name: "gorgias_delete_view"
    description: "Delete a saved view (system views excluded)."
  - name: "gorgias_list_view_items"
    description: "List tickets in a saved view."
  - name: "gorgias_search_view_items"
    description: "Search tickets with an inline view configuration."
